<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>
Calculator
</title>

<link
rel="icon"
type="image/png"
href="https://raw.githubusercontent.com/ggg-site/calculator/refs/heads/main/favicon.png"
>

<style>

body {

  margin: 0;
  background: #111;
  font-family: Arial;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  min-height: 100vh;
  overflow-y: auto;
  color: white;

}

#modeToggle {

  position: fixed;
  top: 20px;
  right: 20px;
  width: 58px;
  height: 58px;
  border-radius: 50%;
  border: none;

  background:
    linear-gradient(
      to bottom,
      #3a3a3a,
      #111111
    );

  color: white;
  font-size: 28px;
  cursor: pointer;
  z-index: 9999;

}

.container {

  width: 390px;
  padding-top: 90px;
  padding-bottom: 50px;

}

#result {

  color: white;
  font-size: 64px;
  text-align: right;
  overflow-x: auto;
  white-space: nowrap;
  margin-bottom: 25px;
  padding: 20px;

}

.scienceGrid {

  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 8px;
  margin-bottom: 15px;

}

.sciBtn {

  height: 50px;
  border: none;
  border-radius: 16px;
  background: #1f1f1f;
  color: white;
  font-size: 18px;
  cursor: pointer;

}

.grid {

  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px;

}

.calcButton {

  height: 78px;
  border: none;
  border-radius: 50%;
  font-size: 34px;
  color: white;
  background: #333333;
  cursor: pointer;

}

.gray {

  background: #6b6b6b;

}

.orange {

  background: #ff9f0a;

}

.zero {

  grid-column: span 2;
  border-radius: 50px;

}

#currencyPage {

  display: none;
  margin-bottom: 30px;

}

.currencyRow {

  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 10px;

}

.iphoneAmount {

  background: transparent;
  border: none;
  outline: none;
  width: 100%;
  min-width: 0;
  overflow-x: auto;

  font-size: clamp(
    32px,
    7vw,
    72px
  );

  font-weight: 300;
  color: white;

}

#amount2 {

  color: #8e8e93;
  pointer-events: none;

}

.iphoneSelect {

  background: #2c2c2e;
  border: none;
  outline: none;
  border-radius: 14px;

  padding:
    12px
    16px;

  color: white;
  font-size: 20px;
  cursor: pointer;
  min-width: 95px;

}

.iphoneSelect option {

  background: #2c2c2e;
  color: white;

}

.divider {

  height: 1px;
  background: #2a2a2a;

  margin:
    12px
    0
    20px;

}

.swapButton {

  color: #ff9f0a;
  font-size: 30px;
  margin-bottom: 22px;
  cursor: pointer;
  user-select: none;

}

</style>

</head>

<body>

<button
id="modeToggle"
onclick="toggleMode()"
>

💱

</button>

<div class="container">

<div id="result">
0
</div>

<div id="currencyPage">

<div class="currencyRow">

<input
id="amount1"
class="iphoneAmount"
value="1000"
readonly
>

<select
id="currency1"
class="iphoneSelect"
onchange="convert()"
>

</select>

</div>

<div class="divider"></div>

<div
class="swapButton"
onclick="swapCurrencies()"
>

⇅

</div>

<div class="currencyRow">

<input
id="amount2"
class="iphoneAmount"
readonly
>

<select
id="currency2"
class="iphoneSelect"
onchange="convert()"
>

</select>

</div>

</div>

<div class="scienceGrid">

<button class="sciBtn" onclick="addFunc('sin')">
sin
</button>

<button class="sciBtn" onclick="addFunc('cos')">
cos
</button>

<button class="sciBtn" onclick="addFunc('tan')">
tan
</button>

<button class="sciBtn" onclick="add('π')">
π
</button>

<button class="sciBtn" onclick="add('e')">
e
</button>

<button class="sciBtn" onclick="addFunc('sqrt')">
√
</button>

<button class="sciBtn" onclick="add('(')">
(
</button>

<button class="sciBtn" onclick="add(')')">
)
</button>

<button class="sciBtn" onclick="add('!')">
x!
</button>

<button class="sciBtn" onclick="add('**')">
xʸ
</button>

</div>

<div class="grid">

<button class="calcButton gray" onclick="backspace()">
⌫
</button>

<button class="calcButton gray" onclick="clearCalc()">
C
</button>

<button class="calcButton gray" onclick="percent()">
%
</button>

<button class="calcButton orange" onclick="add('/')">
÷
</button>

<button class="calcButton" onclick="add('7')">
7
</button>

<button class="calcButton" onclick="add('8')">
8
</button>

<button class="calcButton" onclick="add('9')">
9
</button>

<button class="calcButton orange" onclick="add('*')">
×
</button>

<button class="calcButton" onclick="add('4')">
4
</button>

<button class="calcButton" onclick="add('5')">
5
</button>

<button class="calcButton" onclick="add('6')">
6
</button>

<button class="calcButton orange" onclick="add('-')">
−
</button>

<button class="calcButton" onclick="add('1')">
1
</button>

<button class="calcButton" onclick="add('2')">
2
</button>

<button class="calcButton" onclick="add('3')">
3
</button>

<button class="calcButton orange" onclick="add('+')">
+
</button>

<button class="calcButton gray" onclick="negative()">
+/-
</button>

<button class="calcButton zero" onclick="add('0')">
0
</button>

<button class="calcButton" onclick="add('.')">
.
</button>

<button class="calcButton orange" onclick="calculate()">
=
</button>

</div>

</div>

<script>

let currentMode = "scientific"

let equation = ""

let rates = {

  USD:1,
  EUR:0.92,
  GBP:0.79,
  BDT:117.2,
  INR:83.5,
  JPY:157.2,
  CNY:7.24,
  CAD:1.37,
  AUD:1.52,
  CHF:0.90,
  SGD:1.35,
  HKD:7.81,
  AED:3.67,
  SAR:3.75,
  KRW:1365,
  RUB:89.3,
  BRL:5.4,
  MXN:16.8,
  THB:36.7,
  ZAR:18.4

}

function toggleMode() {

  let currency =
    document.getElementById("currencyPage")

  let result =
    document.getElementById("result")

  let science =
    document.querySelector(".scienceGrid")

  let button =
    document.getElementById("modeToggle")

  if (currentMode == "scientific") {

    currentMode = "currency"

    currency.style.display = "block"

    result.style.display = "none"

    science.style.display = "none"

    button.innerHTML = "🧮"

  }

  else {

    currentMode = "scientific"

    currency.style.display = "none"

    result.style.display = "block"

    science.style.display = "grid"

    button.innerHTML = "💱"

  }

}

function updateDisplay(v) {

  document
    .getElementById("result")
    .innerHTML = v || "0"

}

function add(v) {

  if (currentMode == "currency") {

    let input =
      document.getElementById("amount1")

    if (input.value == "0") {

      input.value = ""

    }

    if (
      v == "." &&
      input.value.includes(".")
    ) {

      return

    }

    input.value += v

    convert()

    return

  }

  equation += v

  updateDisplay(equation)

}

function addFunc(f) {

  equation += f + "("

  updateDisplay(equation)

}

function clearCalc() {

  if (currentMode == "currency") {

    document
      .getElementById("amount1")
      .value = "0"

    convert()

    return

  }

  equation = ""

  updateDisplay("0")

}

function backspace() {

  if (currentMode == "currency") {

    let input =
      document.getElementById("amount1")

    input.value =
      input.value.slice(0, -1)

    if (input.value == "") {

      input.value = "0"

    }

    convert()

    return

  }

  equation =
    equation.slice(0, -1)

  updateDisplay(equation)

}

function negative() {

  if (currentMode == "currency") {

    let input =
      document.getElementById("amount1")

    let value =
      parseFloat(input.value)

    if (isNaN(value)) {

      value = 0

    }

    input.value =
      (-value).toString()

    convert()

    return

  }

  equation =
    `(-1*(${equation}))`

  updateDisplay(equation)

}

function percent() {

  equation += "%"

  updateDisplay(equation)

}

function factorial(n) {

  n = Number(n)

  if (n <= 1) return 1

  let r = 1

  for (
    let i = 2;
    i <= n;
    i++
  ) {

    r *= i

  }

  return r

}

function calculate() {

  try {

    let expr = equation

    while (
      /(\([^()]+\)|\d+)!/.test(expr)
    ) {

      expr =
        expr.replace(

          /(\([^()]+\)|\d+)!/,

          match => {

            let value =
              match.slice(0, -1)

            return `factorial(${value})`

          }

        )

    }

    expr = expr
      .replace(/π/g, "Math.PI")
      .replace(/\be\b/g, "Math.E")

    expr = expr
      .replace(/sqrt\(/g,
        "Math.sqrt("
      )

    expr = expr
      .replace(/sin\(([^)]+)\)/g,
        (_, x) =>
        `Math.sin((${x})*Math.PI/180)`
      )

    expr = expr
      .replace(/cos\(([^)]+)\)/g,
        (_, x) =>
        `Math.cos((${x})*Math.PI/180)`
      )

    expr = expr
      .replace(/tan\(([^)]+)\)/g,
        (_, x) =>
        `Math.tan((${x})*Math.PI/180)`
      )

    expr = expr.replace(
      /\(([^()]+)\)%/g,
      (m, inside) =>
      `(${eval(inside)/100})`
    )

    expr = expr.replace(
      /(\d+(\.\d+)?)%/g,
      (m, a) =>
      Number(a)/100
    )

    expr = expr.replace(
      /(\d+(\.\d+)?)\+(0?\.\d+)/g,
      (m, a, _, b) =>
      Number(a)+(Number(a)*Number(b))
    )

    expr = expr.replace(
      /(\d+(\.\d+)?)-(0?\.\d+)/g,
      (m, a, _, b) =>
      Number(a)-(Number(a)*Number(b))
    )

    let result =
      eval(expr)

    equation =
      result.toString()

    updateDisplay(equation)

  }

  catch {

    updateDisplay("Error")

    equation = ""

  }

}

function buildMenus() {

  let codes =
    Object.keys(rates).sort()

  let c1 =
    document.getElementById("currency1")

  let c2 =
    document.getElementById("currency2")

  c1.innerHTML = ""
  c2.innerHTML = ""

  for (
    let i = 0;
    i < codes.length;
    i++
  ) {

    let code = codes[i]

    let option1 =
      document.createElement("option")

    option1.value = code
    option1.textContent = code

    c1.appendChild(option1)

    let option2 =
      document.createElement("option")

    option2.value = code
    option2.textContent = code

    c2.appendChild(option2)

  }

  c1.value = "USD"
  c2.value = "BDT"

}

function convert() {

  let input =
    document.getElementById("amount1")

  let raw =
    input.value

  raw =
    raw.replace(/,/g, "")

  if (
    raw == "" ||
    raw == "-"
  ) {

    raw = "0"

  }

  let amount =
    Number(raw)

  if (isNaN(amount)) {

    amount = 0

  }

  let from =
    document
      .getElementById("currency1")
      .value

  let to =
    document
      .getElementById("currency2")
      .value

  if (
    !rates[from] ||
    !rates[to]
  ) {

    return

  }

  let usd =
    amount / rates[from]

  let result =
    usd * rates[to]

  document
    .getElementById("amount2")
    .value =

    result.toLocaleString(

      undefined,

      {
        maximumFractionDigits: 6
      }

    )

}

function swapCurrencies() {

  let c1 =
    document.getElementById("currency1")

  let c2 =
    document.getElementById("currency2")

  let a1 =
    document.getElementById("amount1")

  let a2 =
    document.getElementById("amount2")

  let temp =
    c1.value

  c1.value =
    c2.value

  c2.value =
    temp

  a1.value =
    a2.value
      .replace(/,/g, "")

  convert()

}

buildMenus()

convert()

</script>

</body>
</html>
